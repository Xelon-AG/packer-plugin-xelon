version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    allow:
      - dependency-name: "github.com/hashicorp/*"

  - package-ecosystem: "gomod"
    directory: "/tools"
    schedule:
      interval: "daily"
